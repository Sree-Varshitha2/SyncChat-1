<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SyncChat</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;overflow:hidden}
body{font-family:'Inter',sans-serif;font-size:14px}
button{font-family:'Inter',sans-serif;cursor:pointer}
input,textarea{font-family:'Inter',sans-serif}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{border-radius:4px}

/* ── DARK THEME ── */
.dark{
  --bg0:#0e0e12;--bg1:#14141a;--bg2:#1c1c26;--bg3:#242432;--bg4:#2c2c3e;
  --t1:#f0f0ff;--t2:#9090b8;--t3:#5a5a80;
  --ac:#7c6dfa;--ac2:#a78bfa;--acg:rgba(124,109,250,.18);
  --gr:linear-gradient(135deg,#7c6dfa,#a78bfa);
  --bd:rgba(255,255,255,.07);
  --sh:0 8px 32px rgba(0,0,0,.5);
  --bub-me:linear-gradient(135deg,#4f3adc,#7c6dfa);
  --bub-them:#242432;
  --tc-me:#fff;--tc-them:#f0f0ff;
  --inp:#1c1c26;
  --sc:#3c3c50;
  --danger:#ef4444;--green:#22c55e;--yellow:#f59e0b;
}
/* ── LIGHT THEME ── */
.light{
  --bg0:#f5f5f8;--bg1:#ffffff;--bg2:#f0f0f5;--bg3:#e8e8f0;--bg4:#dcdcec;
  --t1:#111118;--t2:#555578;--t3:#8888a8;
  --ac:#6255e0;--ac2:#8b7af0;--acg:rgba(98,85,224,.12);
  --gr:linear-gradient(135deg,#6255e0,#8b7af0);
  --bd:rgba(0,0,0,.08);
  --sh:0 4px 20px rgba(0,0,0,.1);
  --bub-me:linear-gradient(135deg,#6255e0,#8b7af0);
  --bub-them:#ffffff;
  --tc-me:#fff;--tc-them:#111118;
  --inp:#ffffff;
  --sc:#c8c8dc;
  --danger:#dc2626;--green:#16a34a;--yellow:#d97706;
}

#root{display:flex;width:100vw;min-width:100vw;height:100vh;min-height:100vh;background:var(--bg0);color:var(--t1);overflow:hidden}

/* ── LOGIN ── */
.login-wrap{display:flex;align-items:center;justify-content:center;width:100%;height:100%;background:var(--bg0);position:relative;overflow:hidden}
.login-mesh{position:absolute;inset:0;background-image:linear-gradient(var(--bd) 1px,transparent 1px),linear-gradient(90deg,var(--bd) 1px,transparent 1px);background-size:48px 48px;opacity:.35;animation:meshDrift 26s linear infinite;pointer-events:none}
.login-glow{position:absolute;border-radius:50%;filter:blur(100px);pointer-events:none}
.lg1{width:500px;height:500px;background:var(--acg);top:-20%;left:-10%;animation:orbPulse 7s ease-in-out infinite}
.lg2{width:400px;height:400px;background:rgba(167,139,250,.08);bottom:-15%;right:-5%;animation:orb 8s ease-in-out infinite}
.lg3{width:340px;height:340px;background:rgba(124,109,250,.07);top:35%;right:18%;animation:orb 11s ease-in-out infinite reverse}
.login-particles{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.login-particle{position:absolute;bottom:-20px;border-radius:50%;background:var(--ac);opacity:0;animation:particleRise linear infinite}
.login-card{background:var(--bg1);border:1px solid var(--bd);border-radius:24px;padding:40px 36px;width:420px;max-width:94vw;position:relative;z-index:1;box-shadow:var(--sh)}
.login-logo{text-align:center;margin-bottom:28px}
.logo-mark{width:68px;height:68px;border-radius:20px;background:var(--gr);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:32px;box-shadow:0 0 40px var(--acg)}
.login-logo h1{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;background:var(--gr);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.login-logo p{color:var(--t2);font-size:13px;margin-top:4px}
.theme-toggle-row{display:flex;gap:8px;justify-content:center;margin-bottom:18px}
.th-pill{padding:6px 16px;border-radius:20px;border:1px solid var(--bd);background:var(--bg2);color:var(--t2);font-size:12px;font-weight:500;transition:all .2s}
.th-pill.active{background:var(--gr);color:#fff;border-color:transparent}
.av-label{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;text-align:center;display:block;margin-bottom:8px}
.av-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:4px;margin-bottom:10px}
.av-btn{width:32px;height:32px;border-radius:10px;border:2px solid transparent;background:var(--bg3);font-size:16px;transition:all .15s;display:flex;align-items:center;justify-content:center;padding:0}
.av-btn:hover,.av-btn.sel{border-color:var(--ac);background:var(--acg);transform:scale(1.1)}
.sel-av{font-size:46px;text-align:center;margin:6px 0;display:block}
.l-field{width:100%;background:var(--bg2);border:1.5px solid var(--bd);border-radius:12px;padding:12px 15px;color:var(--t1);font-size:14px;outline:none;transition:all .2s;margin-bottom:10px}
.l-field:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acg)}
.l-field::placeholder{color:var(--t3)}
.join-btn{width:100%;padding:14px;background:var(--gr);border:none;border-radius:12px;color:#fff;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;transition:all .2s;margin-top:4px}
.join-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 24px var(--acg)}
.join-btn:disabled{opacity:.4;cursor:not-allowed}

/* ── APP LAYOUT ── */
.app{display:flex;flex:1;width:100%;height:100%;background:var(--bg0)}
.sidebar{width:340px;min-width:280px;background:var(--bg1);border-right:1px solid var(--bd);display:flex;flex-direction:column;height:100%}
.chat-area{flex:1;display:flex;flex-direction:column;min-width:0}

/* ── SIDEBAR HEADER ── */
.sb-hdr{padding:14px 16px;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.my-av{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:transform .2s;flex-shrink:0;position:relative}
.my-av:hover{transform:scale(1.05)}
.app-title{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;background:var(--gr);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;flex:1}
.hdr-btn{background:none;border:none;padding:8px;border-radius:10px;font-size:18px;color:var(--t2);transition:all .15s}
.hdr-btn:hover{background:var(--bg3);color:var(--ac)}

/* ── PROFILE DROPDOWN ── */
.profile-drop{background:var(--bg2);border-bottom:1px solid var(--bd);padding:14px 16px}
.pr-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.pr-av-lg{width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.pr-name{font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--t1);font-size:15px}
.pr-bio{font-size:12px;color:var(--t2);margin-top:2px}
.status-pills{display:flex;gap:6px;flex-wrap:wrap}
.st-pill{padding:4px 10px;border-radius:8px;border:1px solid var(--bd);background:var(--bg3);color:var(--t2);font-size:11px;font-weight:500;transition:all .15s}
.st-pill:hover{border-color:var(--ac);color:var(--ac)}

/* ── SEARCH ── */
.srch-wrap{padding:10px 12px;background:var(--bg1);border-bottom:1px solid var(--bd)}
.srch-box{display:flex;align-items:center;gap:8px;background:var(--bg2);border-radius:12px;padding:8px 12px;border:1px solid var(--bd);transition:border-color .2s}
.srch-box:focus-within{border-color:var(--ac)}
.srch-box input{flex:1;background:none;border:none;outline:none;color:var(--t1);font-size:13px}
.srch-box input::placeholder{color:var(--t3)}

/* ── TABS ── */
.sb-tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--bd)}
.sb-tab{flex:1;padding:10px 4px;background:none;border:none;font-size:18px;color:var(--t3);border-bottom:2px solid transparent;transition:all .2s;position:relative}
.sb-tab.on{color:var(--ac);border-bottom-color:var(--ac)}
.sb-tab:hover{color:var(--t1)}
.tab-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--ac)}

/* ── CHAT LIST ── */
.sb-body{flex:1;overflow-y:auto}
.chat-item{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;border-bottom:1px solid var(--bd);transition:background .15s;position:relative}
.chat-item:hover{background:var(--bg2)}
.chat-item.active{background:var(--bg3)}
.chat-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gr);border-radius:0 3px 3px 0}
.ci-av{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;position:relative}
.ci-info{flex:1;min-width:0}
.ci-row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.ci-name{font-weight:600;color:var(--t1);font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-time{font-size:11px;color:var(--t3);flex-shrink:0}
.ci-row2{display:flex;justify-content:space-between;align-items:center}
.ci-prev{font-size:12px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.unread-badge{background:var(--ac);color:#fff;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:700;flex-shrink:0}
.status-dot{width:10px;height:10px;border-radius:50%;position:absolute;bottom:1px;right:1px;border:2px solid var(--bg1)}
.dot-on{background:#22c55e;box-shadow:0 0 6px #22c55e}
.dot-away{background:#f59e0b}
.dot-busy{background:#ef4444}
.dot-off{background:#555}
.s-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}

/* ── CONTACTS ── */
.contact-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--bd);transition:background .15s}
.contact-item:hover{background:var(--bg2)}
.co-av{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;position:relative}
.co-name{font-weight:600;color:var(--t1);font-size:13px;display:block}
.co-sub{font-size:11px;color:var(--t2);display:block;margin-top:1px}

/* ── GROUPS ── */
.group-item{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--bd);transition:background .15s}
.group-item:hover,.group-item.active{background:var(--bg2)}
.g-ico{width:44px;height:44px;border-radius:14px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:20px;border:1px solid var(--bd)}

/* ── CALL HISTORY ── */
.call-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bd)}
.ca-av{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ca-name{font-weight:600;color:var(--t1);font-size:13px}
.ca-meta{font-size:11px;color:var(--t3);margin-top:1px}

/* ── SETTINGS ── */
.sett-wrap{padding:14px}
.sett-wrap h3{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:700;color:var(--t1);margin-bottom:18px}
.sett-section{margin-bottom:22px}
.sett-section label{display:block;font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-weight:600}
.theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.theme-card{padding:12px;border-radius:12px;border:2px solid var(--bd);cursor:pointer;transition:all .2s;text-align:center;font-size:13px;font-weight:600;color:var(--t1)}
.theme-card.active,.theme-card:hover{border-color:var(--ac);background:var(--acg)}
.tog-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bd)}
.tog-info{flex:1;min-width:0}
.tog-label{font-size:13px;color:var(--t1)}
.tog-desc{font-size:11px;color:var(--t3);margin-top:1px}
.tog{width:42px;height:23px;border-radius:12px;background:var(--bg4);border:none;position:relative;cursor:pointer;transition:background .25s;flex-shrink:0;padding:0}
.tog.on{background:var(--ac)}
.tog-knob{width:17px;height:17px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:transform .25s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.tog.on .tog-knob{transform:translateX(19px)}

/* ── STARRED ── */
.starred-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bd)}
.st-av{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}

/* ── AI PANEL ── */
.ai-panel{padding:14px}
.ai-hero{text-align:center;padding:16px 0 14px;border-bottom:1px solid var(--bd);margin-bottom:14px}
.ai-hero-icon{width:66px;height:66px;border-radius:20px;background:var(--gr);display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:30px;box-shadow:0 0 30px var(--acg)}
.ai-hero h3{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:var(--t1)}
.ai-hero p{font-size:12px;color:var(--t2);margin-top:3px}
.ai-sect{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin:12px 0 7px;font-weight:600}
.ai-card{display:flex;align-items:center;gap:12px;padding:11px 12px;background:var(--bg2);border-radius:12px;cursor:pointer;border:1px solid var(--bd);transition:all .2s;margin-bottom:6px;position:relative}
.ai-card:hover{border-color:var(--ac);background:var(--bg3);transform:translateX(4px)}
.ai-card-ic{font-size:22px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;background:var(--bg3);border-radius:10px;flex-shrink:0}
.ai-card strong{font-size:13px;color:var(--t1);font-family:'Space Grotesk',sans-serif;display:block}
.ai-card p{font-size:11px;color:var(--t2);margin-top:1px}
.ai-new{position:absolute;right:10px;top:10px;background:var(--gr);color:#fff;border-radius:6px;padding:2px 6px;font-size:9px;font-weight:700}

/* ── EMPTY STATE ── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;color:var(--t3);text-align:center;gap:8px}
.empty-state-ic{font-size:44px;opacity:.5}

/* ── SIDEBAR FOOTER ── */
.sb-footer{padding:10px 14px;border-top:1px solid var(--bd);background:var(--bg2);display:flex;align-items:center;justify-content:space-between}
.online-count{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t2)}

/* ── CHAT HEADER ── */
.chat-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg1);border-bottom:1px solid var(--bd);min-height:58px}
.ch-left{display:flex;align-items:center;gap:10px;cursor:pointer;flex:1;min-width:0}
.ch-av{width:40px;height:40px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;position:relative;transition:transform .15s}
.ch-left:hover .ch-av{transform:scale(1.06)}
.ch-name{font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--t1);font-size:15px}
.ch-sub{font-size:11px;color:var(--t2);margin-top:1px}
.typing-st{color:var(--ac)}
.ch-actions{display:flex;gap:2px}
.ch-btn{background:none;border:none;padding:8px;border-radius:10px;font-size:20px;color:var(--t2);transition:all .15s}
.ch-btn:hover{background:var(--bg2);color:var(--ac)}

/* ── PINNED BAR ── */
.pinned-bar{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--bg2);border-bottom:1px solid var(--bd);cursor:pointer}
.pin-strip{width:3px;height:28px;background:var(--gr);border-radius:2px;flex-shrink:0}
.pin-text{font-size:12px;color:var(--t1);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pin-count{font-size:11px;color:var(--t3)}

/* ── MESSAGES AREA ── */
.msgs-scroll{flex:1;overflow-y:auto;padding:14px 6%;background:var(--bg0)}
.msgs-inner{display:flex;flex-direction:column;gap:2px;min-height:100%}
.date-sep{display:flex;align-items:center;justify-content:center;margin:14px 0 8px}
.date-sep span{background:var(--bg2);color:var(--t2);font-size:11px;padding:4px 12px;border-radius:20px;border:1px solid var(--bd)}

/* ── MESSAGE BUBBLES ── */
.msg-row{display:flex;align-items:flex-end;gap:8px;margin-bottom:2px;max-width:78%;position:relative}
.msg-row.me{align-self:flex-end;flex-direction:row-reverse}
.msg-row.them{align-self:flex-start}
.msg-av-sm{width:28px;height:28px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-bottom:2px}
.msg-col{display:flex;flex-direction:column;min-width:0}
.msg-sender{font-size:10px;font-weight:700;color:var(--ac);margin-bottom:2px;padding:0 4px;font-family:'Space Grotesk',sans-serif}
.fwd-tag{font-size:10px;color:var(--t3);padding:0 4px 2px;display:flex;align-items:center;gap:3px}
.reply-preview{background:rgba(0,0,0,.15);border-radius:6px 6px 0 0;padding:6px 8px;border-left:3px solid var(--ac);margin-bottom:-4px}
.reply-name{font-size:10px;font-weight:700;color:var(--ac);display:block}
.reply-txt{font-size:11px;color:var(--t2);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.msg-bub-wrap{position:relative}
.msg-bub{padding:8px 12px;border-radius:14px;word-break:break-word;position:relative;max-width:500px;min-width:70px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.msg-bub.me{background:var(--bub-me);border-radius:14px 4px 14px 14px;color:var(--tc-me)}
.msg-bub.them{background:var(--bub-them);border-radius:4px 14px 14px 14px;border:1px solid var(--bd);color:var(--tc-them)}
.msg-txt{font-size:14px;line-height:1.5}
.edited-lbl{font-size:10px;opacity:.6;font-style:italic}
.msg-meta{display:flex;align-items:center;justify-content:flex-end;gap:3px;margin-top:4px}
.msg-time{font-size:10px;opacity:.7}
.ticks{font-size:12px;opacity:.7}
.ticks.read{color:#4fc3f7;opacity:1}
.msg-img{max-width:240px;max-height:200px;border-radius:10px;display:block;object-fit:cover;cursor:pointer}
.msg-video{max-width:260px;border-radius:10px;display:block}
.msg-audio{display:flex;align-items:center;gap:8px;padding:4px 0}
.audio-ctrl{height:30px;width:190px}
.msg-file{display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(0,0,0,.15);border-radius:10px;text-decoration:none;color:inherit;font-size:12px;border:1px solid rgba(255,255,255,.1)}
.pinned-mark{position:absolute;top:4px;right:4px;font-size:10px}

/* ── POLL ── */
.poll-card{background:rgba(0,0,0,.12);border-radius:10px;padding:10px;min-width:200px}
.poll-q{font-size:13px;font-weight:600;margin-bottom:8px;font-family:'Space Grotesk',sans-serif}
.poll-opt{margin-bottom:6px;cursor:pointer}
.poll-track{background:rgba(255,255,255,.08);border-radius:6px;height:28px;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.1);transition:border-color .2s}
.poll-track:hover{border-color:var(--ac)}
.poll-fill{position:absolute;left:0;top:0;bottom:0;background:var(--acg);transition:width .4s ease}
.poll-txt{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:space-between;padding:0 8px;font-size:12px}
.poll-total{font-size:10px;opacity:.6;margin-top:4px}

/* ── HOVER MENU ── */
.hover-menu{position:absolute;top:-8px;background:var(--bg2);border:1px solid var(--bd);border-radius:14px;padding:4px 6px;display:flex;gap:2px;box-shadow:var(--sh);z-index:20;white-space:nowrap}

.call-ring2{top:-18px;left:-18px;right:-18px;bottom:-18px;opacity:.15}

.reconnect-bar{position:fixed;top:0;left:0;right:0;background:linear-gradient(90deg,#f59e0b,#f97316);color:#000;text-align:center;padding:7px;font-size:12px;font-weight:700;z-index:9999;font-family:'Space Grotesk',sans-serif}

}

function fmtTime(ts){ return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
function fmtDate(ts){
  var d=new Date(ts), now=new Date(), diff=now-d, day=86400000;
  if(diff<day && d.getDate()===now.getDate()) return 'Today';
  if(diff<2*day) return 'Yesterday';
  return d.toLocaleDateString([],{month:'short',day:'numeric'});
}
function fmtSeen(ts){
  if(!ts) return '';
  var d=Date.now()-ts;
  if(d<60000) return 'just now';
  if(d<3600000) return Math.floor(d/60000)+'m ago';
  if(d<86400000) return Math.floor(d/3600000)+'h ago';
  return new Date(ts).toLocaleDateString();
}
function fmtDur(s){ return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); }
function inits(n){ return (n||'').split(' ').map(function(x){return x[0];}).join('').toUpperCase().slice(0,2); }
function grad(str){
  var hash=0;
  for(var i=0;i<(str||'').length;i++) hash=(str||'').charCodeAt(i)+((hash<<5)-hash);
  var h1=Math.abs(hash)%360, h2=(h1+50)%360;
  return 'linear-gradient(135deg,hsl('+h1+',55%,45%),hsl('+h2+',55%,55%))';
}
function toB64(file){
  return new Promise(function(res,rej){
    var r=new FileReader();
    r.onload=function(){res(r.result);};
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

function reducer(s,a){
  var t=a.t, p=a.p;
  switch(t){
    case 'ME': return Object.assign({},s,{me:p});
    case 'USERS': return Object.assign({},s,{users:p});
    case 'UPD_USER': return Object.assign({},s,{users:s.users.map(function(u){return u.id===p.id?Object.assign({},u,p):u;})});
    case 'ADD_USER': return Object.assign({},s,{users:s.users.find(function(u){return u.id===p.id;})?s.users:s.users.concat([p])});
    case 'ROOMS': return Object.assign({},s,{rooms:p});
    case 'ADD_ROOM': return Object.assign({},s,{rooms:s.rooms.find(function(r){return r.id===p.id;})?s.rooms:s.rooms.concat([p])});
    case 'SET_MSGS': {
      var m=Object.assign({},s.messages); m[p.rid]=p.msgs;
      return Object.assign({},s,{messages:m});
    }
    case 'ADD_MSG': {
      var ex=s.messages[p.rid]||[];
      if(ex.find(function(x){return x.id===p.msg.id;})) return s;
      var nm=Object.assign({},s.messages); nm[p.rid]=ex.concat([p.msg]);
      var nu=Object.assign({},s.unread);
      if(s.activeRoom!==p.rid&&s.activeDM!==p.rid) nu[p.rid]=(nu[p.rid]||0)+1;
      return Object.assign({},s,{messages:nm,unread:nu});
    }
    case 'UPD_ST': {
      var nm2={}; Object.keys(s.messages).forEach(function(k){ nm2[k]=s.messages[k].map(function(m2){return m2.id===p.id?Object.assign({},m2,{status:p.st}):m2;}); });
      return Object.assign({},s,{messages:nm2});
    }
    case 'UPD_REACT': {
      var nr={}; Object.keys(s.messages).forEach(function(k){ nr[k]=s.messages[k].map(function(m3){return m3.id===p.id?Object.assign({},m3,{reactions:p.reactions}):m3;}); });
      return Object.assign({},s,{messages:nr});
    }
    case 'EDIT_MSG': {
      var ne={}; Object.keys(s.messages).forEach(function(k){ ne[k]=s.messages[k].map(function(m4){return m4.id===p.id?Object.assign({},m4,{text:p.txt,edited:true}):m4;}); });
      return Object.assign({},s,{messages:ne});
    }
    case 'DEL_MSG': {
      var nd=Object.assign({},s.messages); nd[p.rid]=(nd[p.rid]||[]).filter(function(m5){return m5.id!==p.id;}); return Object.assign({},s,{messages:nd});
    }
    case 'POLL_UPD': {
      var npo={}; Object.keys(s.messages).forEach(function(k){ npo[k]=s.messages[k].map(function(m6){return m6.id===p.id?Object.assign({},m6,{poll:p.poll}):m6;}); });
      return Object.assign({},s,{messages:npo});
    }
    case 'PIN_UPD': { var np=Object.assign({},s.pins); np[p.rid]=p.pins; return Object.assign({},s,{pins:np}); }
    case 'TYPING': {
      var ty=Object.assign({},s.typing); var cur=ty[p.rid]||[];
      ty[p.rid]=p.on?(cur.indexOf(p.name)>-1?cur:cur.concat([p.name])):cur.filter(function(n){return n!==p.name;});
      return Object.assign({},s,{typing:ty});
    }
    case 'SET_ROOM': { var u2=Object.assign({},s.unread); u2[p]=0; return Object.assign({},s,{activeRoom:p,activeDM:null,unread:u2}); }
    case 'SET_DM':   { var u3=Object.assign({},s.unread); u3[p]=0; return Object.assign({},s,{activeDM:p,activeRoom:null,unread:u3}); }
    case 'THEME': localStorage.setItem('sc_theme',p); return Object.assign({},s,{theme:p});
    case 'TAB':   return Object.assign({},s,{tab:p});
    case 'IN_CALL':    return Object.assign({},s,{inCall:p});
    case 'ACTIVE_CALL':return Object.assign({},s,{activeCall:p,inCall:null});
    case 'END_CALL':   return Object.assign({},s,{activeCall:null,inCall:null});
    case 'CALL_LOG':   return Object.assign({},s,{callLog:p});
    case 'TOGGLE_AI':  return Object.assign({},s,{showAI:!s.showAI});
    case 'SETTING': { var ns=Object.assign({},s.sets); ns[p.k]=p.v; return Object.assign({},s,{sets:ns}); }
    default: return s;
  }
}

/* ─── WebSocket hook ─── */
function useWS(onMsg){
  var wsRef=useRef(null);
  var onRef=useRef(onMsg);
  var rp=useState(false); var connected=rp[0]; var setConnected=rp[1];
  var rT=useRef(null), pT=useRef(null);
  onRef.current=onMsg;

  var connect=useCallback(function(){
    if(wsRef.current&&wsRef.current.readyState===WebSocket.OPEN) return;
    try{
      var ws=new WebSocket(WS_URL);
      wsRef.current=ws;
      ws.onopen=function(){
        setConnected(true);
        clearTimeout(rT.current);
        pT.current=setInterval(function(){ if(ws.readyState===WebSocket.OPEN) ws.send(JSON.stringify({type:'ping',payload:{}})); },20000);
      };
      ws.onmessage=function(ev){ try{ onRef.current(JSON.parse(ev.data)); }catch(e){} };
      ws.onclose=function(){ setConnected(false); clearInterval(pT.current); rT.current=setTimeout(connect,3000); };
      ws.onerror=function(){ ws.close(); };
    }catch(e){ rT.current=setTimeout(connect,3000); }
  },[]);

  useEffect(function(){
    connect();
    return function(){ clearTimeout(rT.current); clearInterval(pT.current); if(wsRef.current) wsRef.current.close(); };
  },[connect]);

  var send=useCallback(function(type,payload){
    if(wsRef.current&&wsRef.current.readyState===WebSocket.OPEN){
      wsRef.current.send(JSON.stringify({type:type,payload:payload}));
      return true;
    }
    return false;
  },[]);

  return {send:send,connected:connected};
}

/* ══════════════════════════════════════════════
   INPUT BAR
══════════════════════════════════════════════ */
function InputBar(props){
  var onSend=props.onSend, onTyping=props.onTyping, replyTo=props.replyTo, onCancelReply=props.onCancelReply;
  var onPoll=props.onPoll;
  var text=useState(''); var txt=text[0]; var setTxt=text[1];
  var showEmoji=useState(false); var se=showEmoji[0]; var setSe=showEmoji[1];
  var isRec=useState(false); var rec=isRec[0]; var setRec=isRec[1];
  var recTime=useState(0); var rt=recTime[0]; var setRt=recTime[1];
  var emojiQ=useState(''); var eq=emojiQ[0]; var setEq=emojiQ[1];
  var inRef=useRef(null), fileRef=useRef(null), camRef=useRef(null);
  var mediaRef=useRef(null), chunksRef=useRef([]), timerRef=useRef(null), typTimerRef=useRef(null);
  var st=useStore(); var aiOn=st.state.sets.aiReply; var schedOn=st.state.sets.schedMsg;

  var aiSugs=useMemo(function(){
    if(!aiOn||!txt.trim()||txt.length<3) return [];
    return ['👍 Got it!','Thanks!','Sounds great!'];
  },[txt,aiOn]);

  var handleType=function(ev){
    setTxt(ev.target.value);
    onTyping(true);
    clearTimeout(typTimerRef.current);
    typTimerRef.current=setTimeout(function(){onTyping(false);},1500);
  };
  var doSend=function(){
    if(!txt.trim()) return;
    onSend({text:txt.trim()});
    setTxt('');
    onTyping(false);
    setSe(false);
    if(onCancelReply) onCancelReply();
  };
  var handleKey=function(ev){if(ev.key==='Enter'&&!ev.shiftKey){ev.preventDefault();doSend();}};
  var handleFile=function(ev){
    var f=ev.target.files&&ev.target.files[0]; if(!f) return;
    if(f.size>20*1024*1024){alert('Max 20MB');return;}
    toB64(f).then(function(b64){
      onSend({fileData:b64,fileName:f.name,fileType:f.type});
      ev.target.value='';
      if(onCancelReply) onCancelReply();
    });
  };
  var startRec=function(){
    navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
      var rec2=new MediaRecorder(stream);
      mediaRef.current=rec2; chunksRef.current=[];
      rec2.ondataavailable=function(ev){chunksRef.current.push(ev.data);};
      rec2.onstop=function(){
        var blob=new Blob(chunksRef.current,{type:'audio/webm'});
        toB64(blob).then(function(b64){
          onSend({fileData:b64,fileName:'voice_'+Date.now()+'.webm',fileType:'audio/webm'});
          stream.getTracks().forEach(function(t){t.stop();});
          if(onCancelReply) onCancelReply();
        });
      };
      rec2.start(); setRec(true); setRt(0);
      timerRef.current=setInterval(function(){setRt(function(t){return t+1;});},1000);
    }).catch(function(){alert('Microphone access denied');});
  };
  var stopRec=function(){if(mediaRef.current){mediaRef.current.stop();setRec(false);clearInterval(timerRef.current);}};
  var cancelRec=function(){if(mediaRef.current){mediaRef.current.onstop=null;mediaRef.current.stop();setRec(false);clearInterval(timerRef.current);setRt(0);}};
  var insertEmoji=function(em){
    var pos=inRef.current?inRef.current.selectionStart:txt.length;
    setTxt(txt.slice(0,pos)+em+txt.slice(pos));
    if(inRef.current) inRef.current.focus();
  };

  useEffect(function(){return function(){clearInterval(timerRef.current);};},[]); // eslint-disable-line

  var filtE=eq?EMOJIS.filter(function(em){return em.includes(eq);}):EMOJIS;

  return h('div',{className:'inp-area'},
    replyTo&&h('div',{className:'reply-strip'},
      h('div',{style:{flex:1,minWidth:0}},
        h('span',{className:'reply-strip-lbl'},'↩ Replying to '+replyTo.senderName),
        h('span',{className:'reply-strip-txt'},(replyTo.text||'').slice(0,55)||'📎 File')
      ),
      h('button',{className:'cancel-reply',onClick:onCancelReply},'✕')
    ),
    aiSugs.length>0&&h('div',{className:'ai-sugs'},
      h('span',{style:{fontSize:'11px',color:'var(--t3)',flexShrink:0}},'🤖'),
      aiSugs.map(function(sg){return h('button',{key:sg,className:'ai-sug',onClick:function(){onSend({text:sg});setSe(false);}},sg);})
    ),
    se&&h('div',{className:'emoji-picker'},
      h('input',{className:'emoji-srch',placeholder:'Search emoji...',value:eq,onChange:function(ev){setEq(ev.target.value);}}),
      h('div',{className:'emoji-grid'},filtE.map(function(em){return h('button',{key:em,className:'e-btn',onClick:function(){insertEmoji(em);}},em);}))
    ),
    rec
      ?h('div',{className:'rec-bar'},
          h('button',{className:'rec-cancel',onClick:cancelRec},'✕'),
          h('div',{className:'rec-info'},h('div',{className:'rec-dot'}),h('span',null,'Recording '+fmtDur(rt))),
          h('button',{className:'rec-send',onClick:stopRec},'📤 Send')
        )
      :h('div',{className:'inp-row'},
          h('button',{className:'inp-icon-btn',title:'Emoji',onClick:function(){setSe(!se);}},'😊'),
          h('input',{ref:fileRef,type:'file',accept:'*/*',style:{display:'none'},onChange:handleFile}),
          h('button',{className:'inp-icon-btn',title:'Attach',onClick:function(){if(fileRef.current)fileRef.current.click();}},'📎'),
          h('input',{ref:camRef,type:'file',accept:'image/*',capture:'environment',style:{display:'none'},onChange:handleFile}),
          h('button',{className:'inp-icon-btn',title:'Camera',onClick:function(){if(camRef.current)camRef.current.click();}},'📷'),
          h('div',{className:'inp-txt-wrap'},
            h('textarea',{ref:inRef,className:'msg-input',placeholder:'Message...',value:txt,rows:1,onChange:handleType,onKeyDown:handleKey})
          ),
          h('button',{className:'inp-icon-btn',title:'Poll',onClick:function(){if(onPoll)onPoll();}},'📊'),
          txt.trim()
            ?h('button',{className:'send-btn',onClick:doSend},'▶')
            :h('button',{className:'inp-icon-btn',title:'Voice',onMouseDown:startRec,onTouchStart:startRec},'🎙️')
        )
  );
}

/* ══════════════════════════════════════════════
   CHAT WINDOW
══════════════════════════════════════════════ */
function ChatWindow(props){
  var send=props.send;
  var st=useStore(); var s=st.state;
  var me=s.me, users=s.users, rooms=s.rooms, messages=s.messages, typing=s.typing;
  var activeRoom=s.activeRoom, activeDM=s.activeDM;
  var meId=me?me.id:null;
  var replyTo=useState(null); var rpy=replyTo[0]; var setRpy=replyTo[1];
  var editingMsg=useState(null); var em=editingMsg[0]; var setEm=editingMsg[1];
  var editTxt=useState(''); var etxt=editTxt[0]; var setEtxt=editTxt[1];
  var fwdMsg=useState(null); var fwd=fwdMsg[0]; var setFwd=fwdMsg[1];
  var fwdSel=useState([]); var fsel=fwdSel[0]; var setFsel=fwdSel[1];
  var showPoll=useState(false); var spoll=showPoll[0]; var setSpoll=showPoll[1];
  var pollQ=useState(''); var pq=pollQ[0]; var setPq=pollQ[1];
  var pollOpts=useState(['','']); var popts=pollOpts[0]; var setPopts=pollOpts[1];
  var showScroll=useState(false); var sc=showScroll[0]; var setSc=showScroll[1];
  var bottomRef=useRef(null), contRef=useRef(null);

  var rid=activeRoom||activeDM;
  var msgs=messages[rid]||[];
  var typUsers=typing[rid]||[];
  var pins=s.pins[rid]||[];

  var cName='', cSt='', cAv='', isGroup=false, otherUser=null;
  if(activeRoom){
    var rm=rooms.find(function(r){return r.id===activeRoom;});
    cName=rm?rm.name:activeRoom; isGroup=true; cAv='🏠'; cSt=((rm&&rm.members&&rm.members.length)||0)+' members';
  } else if(activeDM){
    var oid=activeDM.split('_').find(function(id){return id!==meId;});
    otherUser=users.find(function(u){return u.id===oid;})||null;
    cName=otherUser?otherUser.username:'Unknown';
    cAv=otherUser?otherUser.avatar:'👤';
    cSt=otherUser&&otherUser.status==='online'?'🟢 Online':'Last seen '+fmtSeen(otherUser&&otherUser.lastSeen?otherUser.lastSeen:0);
  }

  useEffect(function(){if(bottomRef.current) bottomRef.current.scrollIntoView({behavior:'smooth'});},[msgs.length]);
  var handleScroll=function(){var el=contRef.current;if(el) setSc(el.scrollHeight-el.scrollTop-el.clientHeight>220);};

  var doSend=function(payload){
    if(!rid) return;
    var pl=Object.assign({},payload,{replyTo:rpy});
    if(activeRoom) send('message',Object.assign({roomId:activeRoom},pl));
    else if(activeDM){
      var oid2=activeDM.split('_').find(function(id){return id!==meId;});
      send('dm',Object.assign({toId:oid2},pl));
    }
    setRpy(null);
  };
  var doTyping=function(on){if(rid) send('typing',{roomId:rid,on:on});};

  useEffect(function(){
    if(!rid||msgs.length===0) return;
    var unread=msgs.filter(function(m){return m.senderId!==meId&&m.status!=='read';});
    if(unread.length>0) send('read',{roomId:rid,msgIds:unread.map(function(m){return m.id;})});
  },[rid,msgs.length]); // eslint-disable-line

  var startCall=function(type){
    if(!activeDM) return;
    var oid3=activeDM.split('_').find(function(id){return id!==meId;});
    if(!oid3) return;
    st.setActiveCall({type:type,peerId:oid3,peerName:cName,peerAvatar:cAv,callId:'loc_'+Date.now(),direction:'outgoing'});
    send('call_offer',{toId:oid3,callType:type});
  };

  var submitEdit=function(){
    if(!etxt.trim()) return;
    send('edit_msg',{roomId:rid,msgId:em.id,text:etxt});
    st.editMsg(em.id,etxt);
    setEm(null);
  };

  var handlePin=function(msg){
    send('pin_msg',{roomId:rid,msgId:msg.id});
    var cur=s.pins[rid]||[];
    var exists=cur.find(function(x){return x.id===msg.id;});
    if(exists) st.pinUpd(rid,cur.filter(function(x){return x.id!==msg.id;}));
    else st.pinUpd(rid,cur.concat([{id:msg.id,text:msg.text||'',senderName:msg.senderName}]));
  };

  var submitPoll=function(){
    if(!pq.trim()) return;
    var opts=popts.filter(function(o){return o.trim();});
    if(opts.length<2){alert('Need at least 2 options');return;}
    send('message',{roomId:rid,text:'📊 '+pq,poll:{question:pq,options:opts.map(function(o){return{text:o,votes:[]};}),total:0}});
    setSpoll(false); setPq(''); setPopts(['','']);
  };

  var doForward=function(){
    if(!fsel.length||!fwd) return;
    send('forward_msg',{msgId:fwd.id,toRoomIds:fsel});
    setFwd(null); setFsel([]);
  };

  var grouped=[]; var lastD=null;
  msgs.forEach(function(m){
    var d=fmtDate(m.timestamp);
    if(d!==lastD){grouped.push({tp:'date',label:d});lastD=d;}
    grouped.push({tp:'msg',msg:m});
  });

  var allRooms=rooms.map(function(r){return{id:r.id,name:r.name,isGroup:r.isGroup};});

  if(!rid){
    return h('div',{className:'welcome-screen'},
      h('div',{className:'wlc-icon'},'⚡'),
      h('h2',{className:'wlc-h'},'Welcome to SyncChat'),
      h('p',{className:'wlc-p'},'Select a chat to start messaging'),
      h('div',{className:'wlc-chips'},

        ),

        )

    ),

          if(item.tp==='date') return h('div',{key:'d'+i,className:'date-sep'},h('span',null,item.label));
          var msg=item.msg; var isMe=msg.senderId===meId;
          return h(MsgBubble,{key:msg.id,msg:msg,isMe:isMe,
            onReply:function(m){setRpy(m);},

        ),

      )

    em&&h('div',{className:'modal-bg'},

        )
      )
    ),

    spoll&&h('div',{className:'modal-bg'},

        h('h4',null,'📊 Create Poll'),

        popts.map(function(opt,i){
          return h('input',{key:i,className:'modal-field',placeholder:'Option '+(i+1)+'...',value:opt,style:{resize:'none',minHeight:'auto'},
            onChange:function(ev){var a=popts.slice();a[i]=ev.target.value;setPopts(a);}});
        }),
        h('button',{onClick:function(){setPopts(popts.concat(['']));},style:{width:'100%',padding:'8px',background:'none',border:'1px dashed var(--bd)',borderRadius:'10px',color:'var(--ac)',marginBottom:'8px',fontSize:'12px'}},'+ Add Option'),
        h('div',{className:'modal-actions'},
          h('button',{className:'btn-cancel',onClick:function(){setSpoll(false);}},'Cancel'),

        )
      )
    ),

    /* Forward modal */
    fwd&&h('div',{className:'modal-bg'},
      h('div',{className:'modal-box'},
        h('h4',null,'↪ Forward Message'),
        h('p',{style:{fontSize:'12px',color:'var(--t2)',marginBottom:'10px'}},'"'+(fwd.text||'File').slice(0,50)+'"'),
        h('div',{className:'fwd-list'},
          allRooms.map(function(r){
            var sel2=fsel.indexOf(r.id)>-1;
            return h('div',{key:r.id,className:'fwd-item'+(sel2?' sel':''),onClick:function(){
              setFsel(sel2?fsel.filter(function(x){return x!==r.id;}):fsel.concat([r.id]));
            }},
              h('div',{className:'fwd-av',style:{background:grad(r.name)}},r.isGroup?'🏠':'👤'),
              h('span',{style:{fontSize:'13px',color:'var(--t1)',flex:1}},r.name),
              sel2&&h('span',{style:{color:'var(--ac)'}},'✓')
            );
          })
        ),
        h('div',{className:'modal-actions'},
          h('button',{className:'btn-cancel',onClick:function(){setFwd(null);}},'Cancel'),
          h('button',{className:'btn-prim',onClick:doForward},'Forward ('+fsel.length+')')
        )
      )
    ),

    h(InputBar,{onSend:doSend,onTyping:doTyping,replyTo:rpy,onCancelReply:function(){setRpy(null);},onPoll:function(){setSpoll(true);}})
  );
}

/* ══════════════════════════════════════════════
   AI CHATBOT PANEL
══════════════════════════════════════════════ */
function AIPanel(){
  var st=useStore();
  var initMsgs=[{role:'bot',text:'Hi! 👋 I\'m your SyncChat AI.\n\nI can help with:\n• 💡 Code questions & debugging\n• 🌐 Translations\n• 📝 Chat summaries\n• 😂 Jokes & fun\n• And much more!\n\nWhat do you need?'}];
  var msgs=useState(initMsgs); var ms=msgs[0]; var setMs=msgs[1];
  var inp=useState(''); var iv=inp[0]; var setIv=inp[1];
  var loading=useState(false); var ld=loading[0]; var setLd=loading[1];
  var botRef=useRef(null);

  useEffect(function(){if(botRef.current) botRef.current.scrollIntoView({behavior:'smooth'});},[ms.length]);

  var askAI=function(q){
    if(!q.trim()) return;
    setMs(function(prev){return prev.concat([{role:'user',text:q.trim()}]);});
    setIv('');
    setLd(true);
    setTimeout(function(){
      setMs(function(prev){return prev.concat([{role:'bot',text:getAIResp(q)}]);});
      setLd(false);
    },500+Math.random()*600);
  };
  var handleKey=function(ev){if(ev.key==='Enter'&&!ev.shiftKey){ev.preventDefault();askAI(iv);}};

  return h('div',{className:'ai-bot-panel'},
    h('div',{className:'ai-bot-hdr'},
      h('div',{className:'ai-bot-av'},'🤖'),
      h('div',null,h('div',{className:'ai-bot-title'},'SyncChat AI'),h('div',{className:'ai-bot-st'},'● Active')),
      h('button',{className:'ai-bot-close',onClick:function(){st.toggleAI();}},'✕')
    ),
    h('div',{className:'ai-quick'},
      AI_QS.map(function(q){return h('button',{key:q,className:'ai-q',onClick:function(){askAI(q);}},q);})
    ),
    h('div',{className:'ai-bot-msgs'},
      ms.map(function(m,i){
        return h('div',{key:i,className:'ai-bub '+m.role},
          m.text.split('\n').map(function(line,j){return h('span',{key:j},line,j<m.text.split('\n').length-1&&h('br',null));})
        );
      }),
      ld&&h('div',{className:'ai-bub bot'},h('div',{className:'ai-loading'},h('span',null),h('span',null),h('span',null))),
      h('div',{ref:botRef})
    ),
    h('div',{className:'ai-inp-row'},
      h('textarea',{className:'ai-inp',placeholder:'Ask anything...',value:iv,rows:1,onChange:function(ev){setIv(ev.target.value);},onKeyDown:handleKey}),
      h('button',{className:'ai-send',onClick:function(){askAI(iv);}},'▶')
    )
  );
}

/* ══════════════════════════════════════════════
   CALL SCREEN
══════════════════════════════════════════════ */
function CallScreen(props){
  var send=props.send;
  var st=useStore(); var s=st.state;
  var inCall=s.inCall, activeCall=s.activeCall;
  var callTime=useState(0); var ct=callTime[0]; var setCt=callTime[1];
  var muted=useState(false); var mu=muted[0]; var setMu=muted[1];
  var vidOn=useState(true); var vo=vidOn[0]; var setVo=vidOn[1];
  var spkOn=useState(true); var so=spkOn[0]; var setSo=spkOn[1];
  var timerRef=useRef(null);

  useEffect(function(){
    if(activeCall&&activeCall.direction!=='outgoing'){
      timerRef.current=setInterval(function(){setCt(function(t){return t+1;});},1000);
    }
    return function(){clearInterval(timerRef.current);};
  },[activeCall]);

  if(!inCall&&!activeCall) return null;

  /* Incoming call */
  if(inCall&&!activeCall){
    return h('div',{className:'call-overlay incoming-call'},
      h('div',{className:'call-card'},
        h('div',{className:'call-card-glow'}),
        h('div',{className:'call-type-lbl'},inCall.callType==='video'?'📹  Incoming Video Call':'📞  Incoming Voice Call'),
        h('div',{className:'call-av-wrap'},
          h('div',{className:'call-ring call-ring1'}),
          h('div',{className:'call-ring call-ring2'}),
          h('div',{className:'call-av-big',style:{background:grad(inCall.callerName)}},h('span',null,inCall.callerAvatar||inits(inCall.callerName)))
        ),
        h('h3',null,inCall.callerName),
        h('p',null,'SyncChat '+(inCall.callType==='video'?'Video':'Voice')+' Call'),
        h('div',{className:'call-wave'},h('span',null),h('span',null),h('span',null),h('span',null),h('span',null)),
        h('div',{className:'call-actions'},
          h('div',{className:'call-action-col'},
            h('button',{className:'call-btn reject',onClick:function(){send('call_answer',{callId:inCall.callId,accepted:false});st.endCall();}},'📵'),
            h('span',{className:'call-btn-lbl'},'Decline')
          ),
          h('div',{className:'call-action-col'},
            h('button',{className:'call-btn accept',onClick:function(){
              send('call_answer',{callId:inCall.callId,accepted:true});
              st.setActiveCall(Object.assign({},inCall,{direction:'incoming'}));
              timerRef.current=setInterval(function(){setCt(function(t){return t+1;});},1000);
            }},inCall.callType==='video'?'📹':'📞'),
            h('span',{className:'call-btn-lbl'},'Accept')
          )
        )
      )
    );
  }

  /* Active call */
  if(activeCall){
    var isVid=activeCall.callType==='video'||activeCall.type==='video';
    var pName=activeCall.peerName||activeCall.callerName||'';
    var pAv=activeCall.peerAvatar||activeCall.callerAvatar||inits(pName);
    var callSt=activeCall.direction==='outgoing'&&ct===0?'Calling...':'Connected';
    var hangup=function(){send('call_end',{callId:activeCall.callId||'x'});st.endCall();clearInterval(timerRef.current);};

    return h('div',{className:'call-overlay active-call-screen'},
      isVid
        ?h('div',{className:'video-container'},'📹 Video (WebRTC)',h('div',{className:'video-local'}))
        :h('div',{className:'active-call-bg'},h('div',{className:'active-call-grad'})),
      h('div',{className:'active-call-content'},
        h('div',{className:'active-call-av',style:{background:grad(pName)}},h('span',null,pAv)),
        h('div',{className:'active-call-name'},pName),
        h('div',{className:'active-call-st'},callSt),
        ct>0&&h('div',{className:'active-call-timer'},'⏱ '+fmtDur(ct))
      ),
      h('div',{className:'active-call-ctrls'},
        h('div',{className:'ctrl-col'},
          h('button',{className:'ctrl-btn'+(mu?' ctrl-on':''),onClick:function(){setMu(!mu);}},mu?'🔇':'🎤'),
          h('div',{className:'ctrl-lbl'},mu?'Unmute':'Mute')
        ),
        h('div',{className:'ctrl-col'},
          h('button',{className:'ctrl-btn'+(!so?' ctrl-on':''),onClick:function(){setSo(!so);}},so?'🔊':'🔈'),
          h('div',{className:'ctrl-lbl'},'Speaker')
        ),
        h('div',{className:'ctrl-col'},
          h('button',{className:'ctrl-btn ctrl-end',onClick:hangup},'📵'),
          h('div',{className:'ctrl-lbl',style:{color:'#f87171'}},'End')
        ),
        isVid&&h('div',{className:'ctrl-col'},
          h('button',{className:'ctrl-btn'+(vo?'':' ctrl-on'),onClick:function(){setVo(!vo);}},vo?'📹':'📷'),
          h('div',{className:'ctrl-lbl'},'Camera')
        ),
        h('div',{className:'ctrl-col'},
          h('button',{className:'ctrl-btn'},'🔃'),
          h('div',{className:'ctrl-lbl'},'Flip')
        )
      )
    );
  }

  return null;
}

/* ══════════════════════════════════════════════
   ROOT
══════════════════════════════════════════════ */
function AppInner(){
  var st=useStore(); var s=st.state;
  var me=s.me, theme=s.theme;

  var handleMsg=function(msg){
    var type=msg.type, p=msg.payload;
    if(type==='welcome'){
      st.setMe({id:p.userId,username:p.username});
      st.setUsers(p.users);
      st.setRooms(p.rooms);
      if(p.messages&&p.messages.length) st.setMsgs('general',p.messages);
      if(p.callLog) st.setCallLog(p.callLog);
    }
    else if(type==='user_joined') st.addUser(p);
    else if(type==='user_status') st.updUser({id:p.userId,status:p.status,lastSeen:p.lastSeen});
    else if(type==='message') st.addMsg(p.roomId,p);
    else if(type==='dm_message') st.addMsg(p.roomId,p);
    else if(type==='dm_history') st.setMsgs(p.roomId,p.messages);
    else if(type==='dm_room') st.addRoom(p.room);
    else if(type==='room_history'){ st.setMsgs(p.roomId,p.messages); if(p.pinned) st.pinUpd(p.roomId,p.pinned); }
    else if(type==='typing') st.setTyping(p.roomId||'general',p.username,p.on);
    else if(type==='msg_status') st.updSt(p.msgId,p.status);
    else if(type==='read_receipt'){ if(p.msgIds) p.msgIds.forEach(function(id){st.updSt(id,'read');}); }
    else if(type==='reaction') st.updReact(p.msgId,p.reactions);
    else if(type==='msg_edited') st.editMsg(p.msgId,p.text);
    else if(type==='msg_deleted') st.delMsg(p.msgId,p.roomId);
    else if(type==='pin_update') st.pinUpd(p.roomId,p.pins);
    else if(type==='poll_update') st.pollUpd(p.msgId,p.poll);
    else if(type==='incoming_call') st.setInCall(p);
    else if(type==='call_rejected') st.endCall();
    else if(type==='call_ended') st.endCall();
    else if(type==='call_log_update') st.setCallLog(p.callLog);
  };

  var ws=useWS(handleMsg);
  var send=ws.send;
  var connected=ws.connected;

  if(!me){
    return h(LoginScreen,{onJoin:function(info){send('join',info);}});
  }

  return h('div',{className:'app '+theme},
    connected===false&&h('div',{className:'reconnect-bar'},'🔄 Reconnecting to SyncChat...'),
    h(Sidebar,{send:send}),
    h(ChatWindow,{send:send}),
    s.showAI&&h(AIPanel,null),
    h(CallScreen,{send:send})
  );
}

function App(){
  return h(Store,null,h(AppInner,null));
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));

})();
</script>
